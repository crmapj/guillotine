name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Tests
        run: python -m pytest -q
      - name: Inspect smoke
        run: guillotine inspect tests/fixtures/todo_openapi.yaml --format json
      - name: Generated compile smoke
        run: |
          guillotine build tests/fixtures/todo_openapi.yaml -o /tmp/guillotine-smoke
          python -m compileall -q /tmp/guillotine-smoke/acme_tasks /tmp/guillotine-smoke/mcp
      - name: Build package
        run: python -m build
